<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OrderFlowDemo</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 50px; }
    form { background: #fff; padding: 20px; border-radius: 8px; max-width: 400px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1);}
    input, textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
    button { background: #0073e6; color: #fff; border: none; padding: 12px; border-radius: 5px; cursor: pointer; }
    button:hover { background: #005bb5; }
  </style>
</head>
<body>

  <h2 style="text-align:center;">OrderFlowDemo</h2>

  <form id="orderForm">
    <label for="name">Full Name:</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>

    <label for="product">Product Name:</label>
    <input type="text" id="product" name="product" required>

    <label for="quantity">Quantity:</label>
    <input type="number" id="quantity" name="quantity" min="1" required>

    <label for="notes">Additional Notes:</label>
    <textarea id="notes" name="notes" rows="3"></textarea>

    <button type="submit">Place Order</button>
  </form>

  <script>

  const form = document.getElementById('orderForm');
  const API_URL = "https://3nyp794ss6.execute-api.us-east-1.amazonaws.com/order"; //  API endpoint

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    const data = {
      name: form.name.value,
      email: form.email.value,
      product: form.product.value,
      quantity: form.quantity.value,
      notes: form.notes.value
    };

    fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(response => {
        console.log("Data sent to AWS:", response);
        alert("Order submitted successfully!");
        form.reset();
    })
    .catch(err => {
        console.error("Error sending data:", err);
        alert("Failed to submit order.");
    });
  });

  </script>

</body>
</html>
