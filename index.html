<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OrderFlow Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* Global Styles */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Roboto', sans-serif; background: #f5f7fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

    /* Form Container */
    .form-container {
      background: #ffffff;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 450px;
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    /* Floating Label Styles */
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group input,
    .input-group textarea {
      width: 100%;
      padding: 14px 14px 14px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      font-size: 15px;
      transition: 0.3s;
    }

    .input-group textarea { resize: none; }

    .input-group label {
      position: absolute;
      top: 50%;
      left: 12px;
      transform: translateY(-50%);
      background: #fff;
      padding: 0 5px;
      color: #aaa;
      font-size: 15px;
      pointer-events: none;
      transition: 0.3s;
    }

    .input-group input:focus + label,
    .input-group input:not(:placeholder-shown) + label,
    .input-group textarea:focus + label,
    .input-group textarea:not(:placeholder-shown) + label {
      top: -8px;
      left: 10px;
      font-size: 12px;
      color: #0073e6;
    }

    .input-group input:focus,
    .input-group textarea:focus {
      border-color: #0073e6;
      box-shadow: 0 0 5px rgba(0,115,230,0.3);
    }

    /* Submit Button */
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #0073e6;
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #005bb5;
    }

    /* Responsive */
    @media(max-width: 480px) {
      .form-container { padding: 25px 20px; }
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h2>OrderFlow Demo</h2>
    <form id="orderForm">

      <div class="input-group">
        <input type="text" id="name" name="name" placeholder=" " required>
        <label for="name">Full Name</label>
      </div>

      <div class="input-group">
        <input type="email" id="email" name="email" placeholder=" " required>
        <label for="email">Email Address</label>
      </div>

      <div class="input-group">
        <input type="text" id="product" name="product" placeholder=" " required>
        <label for="product">Product Name</label>
      </div>

      <div class="input-group">
        <input type="number" id="quantity" name="quantity" placeholder=" " min="1" required>
        <label for="quantity">Quantity</label>
      </div>

      <div class="input-group">
        <textarea id="notes" name="notes" placeholder=" " rows="3"></textarea>
        <label for="notes">Additional Notes</label>
      </div>

      <button type="submit">Place Order</button>
    </form>
  </div>
<script src="Ecommerce.js"></script>
</body>
</html>
